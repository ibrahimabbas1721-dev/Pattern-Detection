<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern Detection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Pattern Detection</h1>

    <ul>
      <p>Takes a comma-separated array and determines:</p>
      <li>Is the array sorted ascending?</li>
      <li>Is it sorted descending?</li>
      <li>Is it strictly increasing?</li>
      <li>Is it strictly decreasing?</li>
      <li>Or is it unsorted?</li>
    </ul>

    <label>Enter an array</label>
    <input id="inp" type="text">
    <button id="btn">Submit</button>

    <p id="ans">So the array is .....</p>
  </div>
  
</body>
<script src="first.js"></script>
</html>
